name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install moon
        run: |
          curl -fsSL https://moonrepo.dev/install/moon.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Build
        run: moon run :build

      - name: Test
        run: moon run :test

      - name: Lint
        run: moon run :lint

      - name: Format check
        run: moon run :fmt

      - name: Check committed schema is fresh
        run: moon run schema:check

      - name: Upload pitch sweep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pitch-sweep
          path: |
            target/tmp/pitch_sweep.csv
            target/tmp/pitch_sweep_grid.txt
          if-no-files-found: warn

      - name: Upload vibrato sweep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vibrato-sweep
          path: |
            target/tmp/vibrato_sweep.csv
            target/tmp/vibrato_sweep_grid.txt
          if-no-files-found: warn

      - name: Upload onset sweep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onset-sweep
          path: |
            target/tmp/onset_sweep.csv
            target/tmp/onset_sweep_grid.txt
          if-no-files-found: warn

      - name: Upload breath sweep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: breath-sweep
          path: |
            target/tmp/breath_sweep.csv
            target/tmp/breath_sweep_grid.txt
          if-no-files-found: warn

      - name: Upload vibrato SNR sweep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vibrato-snr-sweep
          path: |
            target/tmp/vibrato_snr_sweep.csv
            target/tmp/vibrato_snr_sweep_grid.txt
          if-no-files-found: warn

      - name: Upload onset SNR sweep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onset-snr-sweep
          path: |
            target/tmp/onset_snr_sweep.csv
            target/tmp/onset_snr_sweep_grid.txt
          if-no-files-found: warn

      - name: Upload breath distractor sweep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: breath-distractor-sweep
          path: |
            target/tmp/breath_distractor_sweep.csv
            target/tmp/breath_distractor_sweep_grid.txt
          if-no-files-found: warn
