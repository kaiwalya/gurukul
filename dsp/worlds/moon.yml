$schema: 'https://moonrepo.dev/schemas/project.json'

type: configuration
language: unknown

# cli is an application layer; moon forbids configuration→application deps.
# Tasks below invoke cargo directly and must be run after `cargo build -p dsp-cli`.

tasks:
  # No Cargo crate here — disable the inherited Rust tasks.
  build:
    command: 'noop'
    options:
      runFromWorkspaceRoot: true

  test:
    command: 'noop'
    deps:
      - '~:test-worlds'
    options:
      runFromWorkspaceRoot: true

  lint:
    command: 'noop'
    options:
      runFromWorkspaceRoot: true

  fmt:
    command: 'noop'
    options:
      runFromWorkspaceRoot: true

  validate:
    command: 'cargo run -p dsp-cli -- validate dsp/worlds/hello.json'
    inputs:
      - 'hello.json'
    options:
      runFromWorkspaceRoot: true

  test-worlds:
    command: 'cargo run -p dsp-cli -- test dsp/worlds/test'
    options:
      runFromWorkspaceRoot: true
