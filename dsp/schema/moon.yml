$schema: 'https://moonrepo.dev/schemas/project.json'

type: configuration
language: unknown

# cli is an application layer; moon forbids configuration→application deps.
# Tasks below invoke cargo directly and must be run after `cargo build -p dsp-cli`.

tasks:
  # No Cargo crate here — disable the inherited Rust tasks.
  build:
    command: 'noop'
    options:
      runFromWorkspaceRoot: true

  test:
    command: 'noop'
    options:
      runFromWorkspaceRoot: true

  lint:
    command: 'noop'
    options:
      runFromWorkspaceRoot: true

  fmt:
    command: 'noop'
    options:
      runFromWorkspaceRoot: true

  regenerate:
    command: 'bash -c "cargo run --quiet -p dsp-cli -- emit-schema > dsp/schema/world.schema.json"'
    options:
      runFromWorkspaceRoot: true

  check:
    command: 'bash -c "cargo run --quiet -p dsp-cli -- emit-schema | diff - dsp/schema/world.schema.json"'
    options:
      runFromWorkspaceRoot: true
