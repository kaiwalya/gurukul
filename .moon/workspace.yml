$schema: 'https://moonrepo.dev/schemas/workspace.json'

# Project IDs are explicit (map form) because directory leaves are
# not unique — both `dsp/cli` and `apps/coach-cli` exist. The ID on the
# left matches the Cargo package name for that crate.
projects:
  # dsp layer
  dsp-cli: dsp/cli
  engine: dsp/engine
  engine-ffi: dsp/engine-ffi
  node-assert-near: dsp/node-assert-near
  node-breath: dsp/node-breath
  node-gain: dsp/node-gain
  node-mix-sum: dsp/node-mix-sum
  node-null-sink: dsp/node-null-sink
  node-onset: dsp/node-onset
  node-passthrough: dsp/node-passthrough
  node-pitch-error: dsp/node-pitch-error
  node-pitch-yin: dsp/node-pitch-yin
  node-rms-meter: dsp/node-rms-meter
  node-synth-breath: dsp/node-synth-breath
  node-synth-onsets: dsp/node-synth-onsets
  node-synth-pink-noise: dsp/node-synth-pink-noise
  node-synth-sine: dsp/node-synth-sine
  node-synth-vibrato-sine: dsp/node-synth-vibrato-sine
  node-tracer: dsp/node-tracer
  node-vibrato: dsp/node-vibrato

  # domain ports (trait contracts)
  domain-ports: domain-ports

  # domain adapters (port impls; flavor suffix identifies backing tech)
  adapter-clock-std: domain-adapters/clock-std
  adapter-telemetry-std: domain-adapters/telemetry-std
  adapter-app-coach: domain-adapters/app-coach

  # apps (hosts — <product>-<surface>)
  coach-cli: apps/coach-cli

  # data (lives under dsp/ — schema is derived from engine types,
  # worlds are example inputs to the dsp engine)
  schema: dsp/schema
  worlds: dsp/worlds

telemetry: false
