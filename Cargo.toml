[workspace]
members = [
    "engine",
    "cli",
    "node-sine-source",
    "node-passthrough",
    "node-null-sink",
]
resolver = "2"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = { version = "0.8", features = ["derive"] }
jsonschema = "0.29"
clap = { version = "4", features = ["derive"] }
thiserror = "2"
crossbeam-channel = "0.5"
anyhow = "1"
